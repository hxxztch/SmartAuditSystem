 spring:
   datasource:
     url: jdbc:h2:mem:shenji_audit;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
     username: sa
     password:
     driver-class-name: org.h2.Driver
   h2:
     console:
       enabled: true
       path: /h2-console
   sql:
     init:
       mode: always
       schema-locations: classpath:schema-h2.sql
 
 sa-token:
   is-log: true
 
 logging:
   level:
     com.shenji: debug
