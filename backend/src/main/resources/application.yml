server:
  port: 8088

spring:
  autoconfigure:
    exclude:
    - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
    - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  application:
    name: shenji-server
  datasource:
    url: jdbc:h2:file:./shenji_data;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
sa-token:
  token-name: shenji-token
  timeout: 86400
  is-concurrent: true
  is-share: false
  is-log: true
logging:
  level:
    com.shenji: debug